resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name _;

    # SSE endpoint — must be BEFORE general /api/ block
    # Disables buffering and sets long timeout for streaming
    location /api/v1/shop/events {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
    }

    # API routes → FastAPI
    location /api/ {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webhook routes → FastAPI
    location /webhook/ {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check → FastAPI
    location /health {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
    }

    # Swagger docs → FastAPI
    location /docs {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
    }

    location /openapi.json {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
    }

    location /redoc {
        set $api_upstream http://api:8000;
        proxy_pass $api_upstream;
    }

    # MinIO assets (logos, etc.) — public read
    location /assets/ {
        set $minio_upstream http://minio:9000;
        rewrite ^/assets/(.*)$ /seet-assets/$1 break;
        proxy_pass $minio_upstream;
        proxy_set_header Host minio:9000;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Redirect /admin to /admin/ so it hits the right location block
    location = /admin {
        return 301 /admin/;
    }

    # Admin portal → admin-frontend
    location /admin/ {
        set $admin_upstream http://admin-frontend:3001;
        proxy_pass $admin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Woodpecker CI → woodpecker-server
    location /ci/ {
        set $woodpecker_upstream http://woodpecker-server:8000;
        proxy_pass $woodpecker_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        chunked_transfer_encoding on;
    }

    # Everything else → Next.js
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
