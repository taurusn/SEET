when:
  branch: claude/multi-tenant-messaging-platform-hhjM8
  event: push

steps:
  # ─── Deploy ──────────────────────────────────────────────────────────────
  deploy:
    image: docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/hatim/SEET:/home/hatim/SEET
    commands:
      - git config --global --add safe.directory /home/hatim/SEET
      - cd /home/hatim/SEET
      - git fetch https://github.com/taurusn/SEET.git claude/multi-tenant-messaging-platform-hhjM8
      - git reset --hard FETCH_HEAD
      - docker compose -p seet up --build -d || true
      - sleep 5
      - docker compose -p seet ps
      - docker image prune -f

  # ─── Test ────────────────────────────────────────────────────────────────
  test:
    image: python:3.12-slim
    commands:
      - pip install -r requirements.txt pytest -q
      - python -m pytest tests/ -x -q
    depends_on: []

  lint:
    image: python:3.12-slim
    commands:
      - pip install ruff -q
      - ruff check app/
    depends_on: []
