when:
  branch: claude/multi-tenant-messaging-platform-hhjM8
  event: push

steps:
  # ─── Deploy ──────────────────────────────────────────────────────────────
  deploy:
    image: docker
    commands:
      - cd /home/hatim/SEET
      - git pull origin claude/multi-tenant-messaging-platform-hhjM8
      - docker compose up --build -d
      - docker image prune -f
      - docker compose ps
    backend_options:
      docker:
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
          - /home/hatim/SEET:/home/hatim/SEET

  # ─── Test ────────────────────────────────────────────────────────────────
  test:
    image: python:3.12-slim
    commands:
      - pip install -r requirements.txt -q
      - python -m pytest tests/ -x -q
    depends_on: []

  lint:
    image: python:3.12-slim
    commands:
      - pip install ruff -q
      - ruff check app/
    depends_on: []
