when:
  branch: claude/multi-tenant-messaging-platform-hhjM8
  event: push

steps:
  # ─── Deploy ──────────────────────────────────────────────────────────────
  deploy:
    image: docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/hatim/SEET:/src
    commands:
      - git config --global --add safe.directory /src
      - cd /src
      - git remote set-url origin https://github.com/taurusn/SEET.git
      - git pull origin claude/multi-tenant-messaging-platform-hhjM8
      - docker compose up --build -d
      - docker image prune -f
      - docker compose ps

  # ─── Test ────────────────────────────────────────────────────────────────
  test:
    image: python:3.12-slim
    commands:
      - pip install -r requirements.txt pytest -q
      - python -m pytest tests/ -x -q
    depends_on: []

  lint:
    image: python:3.12-slim
    commands:
      - pip install ruff -q
      - ruff check app/
    depends_on: []
