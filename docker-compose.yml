services:
  # ─── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
      - admin-frontend
    restart: unless-stopped

  # ─── Cloudflare Tunnel ──────────────────────────────────────────────────────
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://nginx:80
    depends_on:
      - nginx
    restart: unless-stopped

  # ─── Backend API ────────────────────────────────────────────────────────────
  api:
    build: .
    expose:
      - "8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  message-worker:
    build: .
    command: python -m app.workers.message_worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  reply-worker:
    build: .
    command: python -m app.workers.reply_worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  dlq-worker:
    build: .
    command: python -m app.workers.dlq_worker
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ─── Admin Frontend ────────────────────────────────────────────────────────
  admin-frontend:
    build: ./admin
    expose:
      - "3001"
    environment:
      - NEXT_PUBLIC_API_URL=
    depends_on:
      - api
    restart: unless-stopped

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=
    depends_on:
      - api
    restart: unless-stopped

  # ─── Object Storage ────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    expose:
      - "9000"
    ports:
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-seet-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-seet-secret-change-me}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Infrastructure ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cafe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cafe_pass}
      POSTGRES_DB: ${POSTGRES_DB:-cafe_reply}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cafe_user} -d ${POSTGRES_DB:-cafe_reply}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-cafe_mq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-cafe_mq_pass}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ─── CI/CD (Woodpecker) ──────────────────────────────────────────────────
  woodpecker-tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://woodpecker-server:8000
    depends_on:
      - woodpecker-server
    restart: unless-stopped

  woodpecker-server:
    image: woodpeckerci/woodpecker-server:latest
    ports:
      - "8080:8000"
    volumes:
      - woodpecker_data:/var/lib/woodpecker
    environment:
      WOODPECKER_HOST: ${WOODPECKER_HOST:-http://localhost:8080}
      WOODPECKER_OPEN: "true"
      WOODPECKER_ADMIN: ${WOODPECKER_ADMIN:-hatim}
      WOODPECKER_REPO_OWNERS: ${WOODPECKER_ADMIN:-hatim}
      WOODPECKER_GITHUB: "true"
      WOODPECKER_GITHUB_CLIENT: ${WOODPECKER_GITHUB_CLIENT}
      WOODPECKER_GITHUB_SECRET: ${WOODPECKER_GITHUB_SECRET}
      WOODPECKER_AGENT_SECRET: ${WOODPECKER_AGENT_SECRET}
    restart: unless-stopped

  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:latest
    depends_on:
      - woodpecker-server
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/hatim/SEET:/home/hatim/SEET
    environment:
      WOODPECKER_SERVER: woodpecker-server:9000
      WOODPECKER_AGENT_SECRET: ${WOODPECKER_AGENT_SECRET}
      WOODPECKER_MAX_WORKFLOWS: 1
      DOCKER_API_VERSION: "1.44"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  woodpecker_data:
